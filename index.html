    <title>The Desert Oasis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="instructions">
        <strong>The Desert Oasis</strong>
        <br>Click to lock the pointer and explore<br>
        <br>press ESC to unlock<br>

        <strong>Controls:</strong><br>
        W - Move Forward<br>
        A - Move Left<br>
        S - Move Backward<br>
        D - Move Right<br>

        <p>Use mouse to look around</p>

    </div>
    
</body>
